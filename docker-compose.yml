# Code Mentor — Local Development Stack
# Brings up: SQL Server, Redis, Azurite (Blob emulator), Seq (logs), and the AI service.
# Backend (.NET) and Frontend (Vite) run on the host, not inside compose.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: codementor-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required in .env}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: codementor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: codementor-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 -l /data

  seq:
    image: datalust/seq:latest
    container_name: codementor-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"  # local dev only; no login prompt
    ports:
      - "5341:80"      # Seq UI (http://localhost:5341)
      - "5342:5341"    # Ingestion endpoint (Serilog sinks)
    volumes:
      - seq-data:/data

  qdrant:
    # Vector DB for F12 RAG Mentor Chat (ADR-036). Reachable only by the AI service; never
    # exposed to the FE. HTTP on 6333, gRPC on 6334. Storage persists via the qdrant-storage
    # volume so re-creating the container preserves indexed chunks.
    image: qdrant/qdrant:v1.13.4
    container_name: codementor-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      # Qdrant's slim image lacks curl/wget, so use bash's /dev/tcp pseudo-device to probe
      # the REST port. Equivalent to a TCP connect — fails the healthcheck if the port is
      # not yet accepting connections.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: codementor-ai
    ports:
      - "8001:8001"
    environment:
      AI_ANALYSIS_OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key-placeholder}
      AI_ANALYSIS_LOG_LEVEL: INFO
      AI_ANALYSIS_DEBUG: "false"
      AI_ANALYSIS_QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mssql-data:
  redis-data:
  azurite-data:
  seq-data:
  qdrant-storage:
