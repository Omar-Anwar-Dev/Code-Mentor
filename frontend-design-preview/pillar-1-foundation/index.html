<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Code Mentor — Neon &amp; Glass Design System</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="vendor/tailwind.js"></script>
<script>
  // Brand tokens — mirror tailwind.config from the spec
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95',950:'#2e1065' },
          secondary: { 400:'#22d3ee',500:'#06b6d4',600:'#0891b2' },
          accent:    { 400:'#e879f9',500:'#d946ef',600:'#c026d3' },
          fuchsia:   { 400:'#e879f9',500:'#d946ef',600:'#c026d3' },
        },
        fontFamily: {
          sans: ['Inter','system-ui','sans-serif'],
          mono: ['"JetBrains Mono"','Consolas','monospace'],
        },
        animation: {
          'float': 'float 6s ease-in-out infinite',
          'fade-in': 'fadeIn 0.3s ease-out',
          'slide-up': 'slideUp 0.3s ease-out',
          'neon-pulse': 'neonPulse 2s ease-in-out infinite',
          'neon-flicker': 'neonFlicker 3s infinite',
          'glow-pulse': 'glowPulse 2s ease-in-out infinite',
          'shimmer': 'shimmer 3s linear infinite',
        },
        keyframes: {
          float:      { '0%,100%':{transform:'translateY(0)'}, '50%':{transform:'translateY(-12px)'} },
          fadeIn:     { '0%':{opacity:0}, '100%':{opacity:1} },
          slideUp:    { '0%':{opacity:0, transform:'translateY(8px)'}, '100%':{opacity:1, transform:'translateY(0)'} },
          neonPulse:  { '0%,100%':{opacity:1, filter:'brightness(1)'}, '50%':{opacity:.7, filter:'brightness(1.3)'} },
          neonFlicker:{ '0%,18%,22%,25%,53%,57%,100%':{opacity:1}, '20%,24%,55%':{opacity:.4} },
          glowPulse:  { '0%,100%':{boxShadow:'0 0 8px rgba(139,92,246,.5),0 0 22px rgba(139,92,246,.35)'}, '50%':{boxShadow:'0 0 14px rgba(139,92,246,.9),0 0 38px rgba(139,92,246,.55)'} },
          shimmer:    { '0%':{backgroundPosition:'-200% 0'}, '100%':{backgroundPosition:'200% 0'} },
        }
      }
    }
  };
</script>

<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: 'cv02','cv03','cv04','cv11'; }
  code, pre, .font-mono { font-family: '"JetBrains Mono"', Consolas, monospace; font-variant-ligatures: contextual; }

  /* page background — fixed radial in dark */
  body { background: #f8fafc; min-height: 100vh; transition: background .4s ease; color: #0f172a; }
  html.dark body {
    background: linear-gradient(135deg,#0a0a0f 0%, #111827 50%, #0f172a 100%);
    background-attachment: fixed;
    color: #e2e8f0;
  }

  /* GRID OVERLAY for hero */
  .bg-grid {
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  html.dark .bg-grid {
    background-image:
      linear-gradient(rgba(139,92,246,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.06) 1px, transparent 1px);
  }

  /* ────────── GLASS SYSTEM ────────── */
  .glass {
    background-color: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.5);
  }
  html.dark .glass {
    background-color: rgba(30,41,59,0.35);
    border-color: rgba(255,255,255,0.08);
  }

  .glass-card {
    background-color: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(226,232,240,0.55);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px -10px rgba(15,23,42,0.08);
  }
  html.dark .glass-card {
    background-color: rgba(30,41,59,0.32);
    border-color: rgba(255,255,255,0.08);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 12px 32px -12px rgba(0,0,0,0.5);
  }

  .glass-frosted {
    background-color: rgba(255,255,255,0.82);
    backdrop-filter: blur(32px) saturate(160%);
    -webkit-backdrop-filter: blur(32px) saturate(160%);
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 16px;
  }
  html.dark .glass-frosted {
    background-color: rgba(15,23,42,0.55);
    border-color: rgba(255,255,255,0.08);
  }

  /* glass-card-neon: animated conic gradient border on hover only */
  .glass-card-neon { position: relative; isolation: isolate; }
  .glass-card-neon::before {
    content: "";
    position: absolute; inset: -1px;
    border-radius: 17px;
    padding: 1.5px;
    background: conic-gradient(from var(--a,0deg), #06b6d4, #3b82f6, #8b5cf6, #ec4899, #06b6d4);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
    z-index: 1;
  }
  .glass-card-neon:hover::before { opacity: 1; animation: spin-conic 4s linear infinite; }
  @property --a { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @keyframes spin-conic { to { --a: 360deg; } }

  /* glass-shimmer: 30deg highlight sweep */
  .glass-shimmer { position: relative; overflow: hidden; }
  .glass-shimmer::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.55) 50%, transparent 65%);
    transform: translateX(-100%);
    animation: shimmer-sweep 3s ease-in-out infinite;
    pointer-events: none;
    mix-blend-mode: overlay;
  }
  html.dark .glass-shimmer::after {
    background: linear-gradient(120deg, transparent 35%, rgba(139,92,246,0.35) 50%, transparent 65%);
  }
  @keyframes shimmer-sweep {
    0%   { transform: translateX(-100%); }
    60%  { transform: translateX(120%); }
    100% { transform: translateX(120%); }
  }

  /* ────────── NEON SHADOWS ────────── */
  .shadow-neon         { box-shadow: 0 0 5px rgba(139,92,246,.6), 0 0 20px rgba(139,92,246,.45), 0 0 35px rgba(139,92,246,.25); }
  .shadow-neon-cyan    { box-shadow: 0 0 5px rgba(34,211,238,.6), 0 0 20px rgba(34,211,238,.45), 0 0 35px rgba(34,211,238,.25); }
  .shadow-neon-purple  { box-shadow: 0 0 5px rgba(124,58,237,.7), 0 0 20px rgba(124,58,237,.5),  0 0 35px rgba(124,58,237,.3); }
  .shadow-neon-pink    { box-shadow: 0 0 5px rgba(236,72,153,.6), 0 0 20px rgba(236,72,153,.45), 0 0 35px rgba(236,72,153,.25); }
  .shadow-neon-green   { box-shadow: 0 0 5px rgba(16,185,129,.6), 0 0 20px rgba(16,185,129,.45), 0 0 35px rgba(16,185,129,.25); }

  /* ────────── NEON TEXT ────────── */
  .text-neon        { text-shadow: 0 0 4px rgba(139,92,246,.9), 0 0 10px rgba(139,92,246,.7), 0 0 22px rgba(139,92,246,.45), 0 0 42px rgba(139,92,246,.25); color:#c4b5fd; }
  .text-neon-cyan   { text-shadow: 0 0 4px rgba(34,211,238,.9), 0 0 10px rgba(34,211,238,.7), 0 0 22px rgba(34,211,238,.45), 0 0 42px rgba(34,211,238,.25); color:#a5f3fc; }
  .text-neon-purple { text-shadow: 0 0 4px rgba(124,58,237,.95),0 0 10px rgba(124,58,237,.75),0 0 22px rgba(124,58,237,.5), 0 0 42px rgba(124,58,237,.3);  color:#ddd6fe; }
  .text-neon-pink   { text-shadow: 0 0 4px rgba(236,72,153,.9), 0 0 10px rgba(236,72,153,.7), 0 0 22px rgba(236,72,153,.45), 0 0 42px rgba(236,72,153,.25); color:#fbcfe8; }
  .text-neon-green  { text-shadow: 0 0 4px rgba(16,185,129,.9), 0 0 10px rgba(16,185,129,.7), 0 0 22px rgba(16,185,129,.45), 0 0 42px rgba(16,185,129,.25); color:#a7f3d0; }

  /* glow utilities (dark mode only — soft violet halos) */
  html.dark .glow-sm { box-shadow: 0 0 12px rgba(139,92,246,0.25); }
  html.dark .glow-md { box-shadow: 0 0 22px rgba(139,92,246,0.35); }
  html.dark .glow-lg { box-shadow: 0 0 36px rgba(139,92,246,0.45); }

  /* gradient text helper */
  .brand-gradient-text {
    background-image: linear-gradient(135deg,#06b6d4 0%,#3b82f6 33%,#8b5cf6 66%,#ec4899 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .brand-gradient-bg {
    background-image: linear-gradient(135deg,#06b6d4 0%,#3b82f6 33%,#8b5cf6 66%,#ec4899 100%);
  }

  /* nicer focus ring */
  .ring-brand:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(139,92,246,0.35), 0 0 0 1px rgba(139,92,246,0.8); }

  /* scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.35); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* selection */
  ::selection { background: rgba(139,92,246,0.35); color: inherit; }

  /* prevent FOUC */
  #root { animation: fadeIn .25s ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel + Lucide — vendored locally into ./vendor/ on 2026-05-12.
     Why: original HTML pulled these from unpkg.com + cdn.tailwindcss.com.
     Bitdefender Total Security's Online Threat Prevention was blocking the
     CDN requests, leaving #root empty and the page blank. SRI hashes from
     claude.ai/design also did not match the real unpkg hashes (separate
     issue, but moot now that we serve locally). Versions pinned:
       react@18.3.1, react-dom@18.3.1, @babel/standalone@7.29.0,
       lucide@0.469.0, tailwindcss play CDN (latest at vendor time). -->
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/babel.js"></script>

<!-- lucide icons (UMD) -->
<script src="vendor/lucide.js"></script>

<!-- App script — bundled.
     NOTE 2026-05-12: original output from claude.ai/design split the app into 6
     JSX files (icons, primitives, sections-1, sections-2, sections-3, app).
     Babel's in-browser runtime transforms each <script type="text/babel"> in
     its own isolated scope AND generates a colliding `_excluded` helper across
     files, so cross-file references (Section / Button / Badge / useState ...)
     fail with ReferenceError and the page renders blank. Concatenated into
     bundle.jsx so the whole app is transformed in one scope. The original
     src/*.jsx files are preserved as the canonical source for Sprint-13
     integration into /frontend/. -->
<script type="text/babel" data-presets="react" src="src/bundle.jsx"></script>
</body>
</html>
